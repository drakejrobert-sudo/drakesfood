<section class="gallery" id="gallery" aria-labelledby="gallery-title">
  <div class="gallery-header">
    <div>
      <p class="eyebrow">Food gallery preview</p>
      <h2 id="gallery-title">Fresh food photography made for slow browsing.</h2>
    </div>
    <p>Curated kitchen moments and warm, plated food for Drake’s portfolio.</p>
  </div>
  <div class="gallery-grid">
    @for (item of galleryItems; track item.imageUrl) {
      <article class="gallery-card">
        <img [src]="item.cardImageUrl" [alt]="item.altText" width="540" height="720" loading="lazy" decoding="async" />
        <div class="gallery-copy">
          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        </div>
      </article>
    }
  </div>
</section>
